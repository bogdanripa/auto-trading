name: Sync demo and live with main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [demo, live]
    steps:
      - name: Fast-forward ${{ matrix.branch }} to main
        id: ff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ matrix.branch }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w '%{http_code}' -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH" \
            -d "{\"sha\":\"$SHA\",\"force\":false}")
          echo "status=$status"
          cat "$response"
          if [ "$status" != "200" ]; then
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat "$response" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Open issue on fast-forward failure
        if: failure() && steps.ff.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ matrix.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_RESPONSE: ${{ steps.ff.outputs.body }}
        run: |
          set -euo pipefail
          title="Sync failed: cannot fast-forward $BRANCH to main"
          body=$(cat <<EOF
          The auto-sync workflow could not fast-forward \`$BRANCH\` to \`main\` at \`$SHA\`.

          This usually means \`$BRANCH\` has commits that are not on \`main\`. Resolve manually — e.g. open a PR from \`main\` into \`$BRANCH\`, or rebase \`$BRANCH\` onto \`main\` and force-push.

          - Run: $RUN_URL
          - Target SHA: \`$SHA\`

          GitHub API response:
          \`\`\`
          $API_RESPONSE
          \`\`\`
          EOF
          )
          curl -sSf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues" \
            -d "$(jq -n --arg t "$title" --arg b "$body" '{title:$t, body:$b}')"
