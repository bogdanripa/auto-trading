## IBC Configuration - Automated IB Gateway login
## See: https://github.com/IbcAlpha/IBC/blob/master/userguide.md

# Credentials (populated at runtime from environment/secrets)
IbLoginId=
IbPassword=

# Trading mode: paper or live
TradingMode=paper

# IB Gateway / TWS selection
IbDir=/opt/ibgateway
FIX=no

# Accept incoming API connections
AcceptIncomingConnectionAction=accept

# Read-only API disabled (we need to trade)
ReadOnlyApi=no

# Auto-restart configuration
IbAutoClosedown=no
ClosedownAt=

# Second factor authentication
# For soft-token 2FA: IBC can forward the time-based code
# Setting this to "yes" means IBC will keep the session alive across the daily reset
IbAutoRestartTime=11:59 PM

# Timeouts.
# On Cloud Run cold start, the JVM + jxbrowser can take 90+ seconds to
# actually render the login dialog. If IBC times out first it exits 1112
# and supervisord restart-loops. Generous window protects against both
# cold start AND transient X startup slowness.
LoginDialogDisplayTimeout=180

# Store cache/logs outside of ephemeral container paths if mounted
IbDirOrderIdIncrementBy=1

# Allow outgoing connections from all IPs (Cloud Run handles network isolation)
TrustedTcpIps=127.0.0.1

# Disable prompts that block automated login
DismissNSEComplianceNotice=yes
DismissPasswordExpiryWarning=yes
AcceptNonBrokerageAccountWarning=yes
ShowAllTrades=no
