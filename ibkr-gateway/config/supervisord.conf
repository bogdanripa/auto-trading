[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

# Stream every child's stdout and stderr to the container's stdout/stderr so
# Cloud Logging (which only sees PID 1's output) can pick them up. Each
# program prefixes its own lines via stdout_logfile_headers / events.

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1024x768x24
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ibgateway]
command=/scripts/start-ibgateway.sh
environment=DISPLAY=":1"
user=trader
autorestart=true
priority=10
startsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fastapi]
command=/usr/bin/python3 -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1
directory=/app
autorestart=true
priority=20
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
